<!doctype html>
<html lang="en" class="h-full w-full overflow-hidden">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>relu-threejs</title>

    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']]
        },
        svg: {
          fontCache: 'global'
        }
      };
    </script>

    <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  </head>
  <body class="m-0 h-full w-full overflow-hidden">
    <div id="app" class="fixed inset-0"></div>
    <div id="debug-panel" class="space-y-5 py-4 px-3" aria-live="polite">
      <div id="stats">x, y, z</div>
      <input id="group-input" type="text" placeholder="group name" class="py-1 px-2" />
      <div class="flex justify-around">
        <button id="target-button" class="flex p-1 rounded border cursor-pointer hover:bg-gray-300">
          <i class="text-blue-500 w-5 h-5" data-lucide="crosshair"></i>
        </button>
        <button id="cam-button" class="flex p-1 rounded border cursor-pointer hover:bg-gray-300">
          <i class="text-blue-500 w-5 h-5" data-lucide="camera"></i>
        </button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
